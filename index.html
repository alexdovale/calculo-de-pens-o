<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Pensão - DPERJ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-xl p-8 space-y-6 bg-white rounded-xl shadow-lg m-4">
        <div class="text-center border-b pb-4">
            <h1 class="text-3xl font-bold text-gray-800">Calculadora de Pensão</h1>
            <p class="mt-2 text-blue-600 font-semibold">Modelo de Escalonamento (Cláusula de Barreira)</p>
        </div>

        <form id="pension-form" class="space-y-6">
              <div>
                  <label for="salario" class="block text-sm font-medium text-gray-700 mb-2">Salário Base do Alimentante (Informado)</label>
                  <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">R$</span>
                        <input type="number" id="salario" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" step="0.01" value="2000">
                  </div>
                  <p id="representacao-minimo" class="text-xs text-gray-500 mt-1 font-medium italic"></p>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                      <label for="num-filhos" class="block text-sm font-medium text-gray-700 mb-2">Número de Filhos</label>
                      <select id="num-filhos" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                          <option value="1">1 filho</option>
                          <option value="2">2 filhos</option>
                          <option value="3">3 filhos ou mais</option>
                      </select>
                  </div>
                  <div class="flex items-end pb-3">
                      <label class="flex items-center cursor-pointer group">
                          <input id="necessidades-especiais" type="checkbox" class="h-5 w-5 text-blue-600 border-gray-300 rounded focus:ring-2 focus:ring-blue-500">
                          <span class="ml-3 text-sm font-medium text-gray-700 group-hover:text-blue-600 transition">Necessidades Especiais (+10%)</span>
                      </label>
                  </div>
              </div>
        </form>

        <div id="resultado" class="space-y-4">
            </div>

        <div class="text-center pt-4">
             <p class="text-[10px] text-gray-400 uppercase tracking-widest">Base de Cálculo: CPC Art. 292, III (12x valor mensal)</p>
        </div>
    </div>

    <script>
        const salarioInput = document.getElementById('salario');
        const numFilhosSelect = document.getElementById('num-filhos');
        const necessidadesCheckbox = document.getElementById('necessidades-especiais');
        const resultadoDiv = document.getElementById('resultado');
        const representacaoTxt = document.getElementById('representacao-minimo');

        const SALARIO_MINIMO = 1621.00;

        const regrasDPERJ = {
            '1': { com: 20, sem: 30 },
            '2': { com: 30, sem: 50 },
            '3': { com: 40, sem: 70 }
        };

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function calcular() {
            const salarioInfo = parseFloat(salarioInput.value) || 0;
            const numFilhos = numFilhosSelect.value;
            const plus = necessidadesCheckbox.checked ? 10 : 0;

            const percCom = regrasDPERJ[numFilhos].com + plus;
            const percSem = regrasDPERJ[numFilhos].sem + plus;

            const valorCom = (salarioInfo * percCom) / 100;
            const valorSem = (SALARIO_MINIMO * percSem) / 100;
            
            // Representação do salário informado em relação ao mínimo
            const porcSobreMinimo = ((salarioInfo / SALARIO_MINIMO) * 100).toFixed(1);
            representacaoTxt.innerText = `* O salário informado representa ${porcSobreMinimo}% do salário mínimo vigente.`;

            resultadoDiv.innerHTML = `
                <div class="grid grid-cols-1 gap-4">
                    <div class="p-4 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg shadow-sm">
                        <h3 class="text-blue-800 font-bold text-sm uppercase mb-2">Se houver Vínculo Empregatício</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-bold text-blue-700">${percCom}%</span>
                            <div class="text-right">
                                <p class="text-xs text-gray-500">Estimativa Mensal</p>
                                <p class="text-lg font-bold text-gray-800">${formatarMoeda(valorCom)}</p>
                            </div>
                        </div>
                        <p class="text-[11px] text-blue-600 mt-2 italic">Incide sobre rendimentos brutos (menos descontos legais).</p>
                    </div>

                    <div class="p-4 bg-orange-50 border-l-4 border-orange-500 rounded-r-lg shadow-sm">
                        <h3 class="text-orange-800 font-bold text-sm uppercase mb-2">Sem Vínculo / Desemprego</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-bold text-orange-700">${percSem}% <small class="text-xs">do Mínimo</small></span>
                            <div class="text-right">
                                <p class="text-xs text-gray-500">Valor Fixo</p>
                                <p class="text-lg font-bold text-gray-800">${formatarMoeda(valorSem)}</p>
                            </div>
                        </div>
                        <p class="text-[11px] text-orange-600 mt-2 italic">Garante o pagamento mínimo em caso de perda de emprego.</p>
                    </div>

                    <div class="p-4 bg-gray-800 text-white rounded-lg shadow-md flex justify-between items-center">
                        <div>
                            <p class="text-[10px] text-gray-400 uppercase">Valor da Causa (12x com vínculo)</p>
                            <p class="text-xl font-bold">${formatarMoeda(valorCom * 12)}</p>
                        </div>
                        <button onclick="copiarValor('${formatarMoeda(valorCom * 12)}')" class="bg-blue-600 hover:bg-blue-500 p-2 rounded transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                            </svg>
                        </button>
                    </div>
                </div>
            `;
        }

        function copiarValor(texto) {
            navigator.clipboard.writeText(texto);
            alert("Valor da causa copiado!");
        }

        [salarioInput, numFilhosSelect, necessidadesCheckbox].forEach(el => {
            el.addEventListener('input', calcular);
        });

        document.addEventListener('DOMContentLoaded', calcular);
    </script>
</body>
</html>
